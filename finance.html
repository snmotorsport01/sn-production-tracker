<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Financial — SN ERP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;background:#0a0a0a;color:#e5e5e5;padding:16px;max-width:600px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:60px}
.hdr{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.card{background:#151515;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #1e1e1e}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;text-align:center;cursor:pointer;border:none;margin-bottom:8px;transition:.12s;-webkit-appearance:none}
.btn:active{transform:scale(.97);opacity:.8}
.btn-p{background:#DC2626;color:#fff}
.btn-g{background:#22c55e;color:#000}
.btn-o{background:transparent;color:#aaa;border:1px solid #333}
.btn-d{background:#ef4444;color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-block;margin:0}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #333;border-top-color:#22c55e;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:#555}

.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.sum-item{background:#0d0d0d;border-radius:10px;padding:12px;text-align:center;border:1px solid #1e1e1e}
.sum-item .n{font-size:24px;font-weight:800}

.tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid #333;background:transparent;color:#888;transition:.15s;flex-shrink:0}
.tab.active{background:#22c55e;color:#000;border-color:#22c55e}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;transition:.3s;opacity:0;pointer-events:none;max-width:90%;background:#22c55e;color:#000}
.toast.err{background:#ef4444;color:#fff}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#151515;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;border:1px solid #1e1e1e;border-bottom:none}
.modal h3{font-size:16px;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#fff;font-size:14px;-webkit-appearance:none}
.form-group textarea{height:60px;resize:none}

.cf-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.cf-row:last-child{border-bottom:none}
.cf-in{color:#4ade80}.cf-out{color:#f87171}

.auth-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;font-size:.8rem}
.auth-bar .user-info{color:#aaa}
.auth-bar .user-info strong{color:#e74c3c}
.auth-bar .role-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;margin-left:8px;text-transform:uppercase;font-weight:600}
.auth-bar .role-admin{background:rgba(231,76,60,.2);color:#e74c3c}
.auth-bar .role-manager{background:rgba(243,156,18,.2);color:#f39c12}
.auth-bar .role-operator{background:rgba(46,204,113,.2);color:#2ecc71}
.auth-bar .logout-btn{background:transparent;border:1px solid #555;color:#aaa;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:.75rem}
.auth-bar .logout-btn:hover{border-color:#e74c3c;color:#e74c3c}
</style>
</head>
<body><script>
(function(){
  var token=sessionStorage.getItem('sn_token');
  var userStr=sessionStorage.getItem('sn_user');
  if(!token||!userStr){window.location.href='login.html';return}
  try{var u=JSON.parse(userStr)}catch(e){window.location.href='login.html';return}
  // Permission check per page
  var page=window.location.pathname.split('/').pop()||'index.html';
  var perms={
    'index.html':['admin','manager','operator'],
    'production.html':['admin','manager','operator'],
    'inventory.html':['admin','manager'],
    'finance.html':['admin'],
    'qr.html':['admin','manager','operator'],
    'report.html':['admin','manager']
  };
  var allowed=perms[page]||['admin'];
  if(allowed.indexOf(u.role)===-1){
    alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้ (ต้องการ: '+allowed.join('/')+')');
    window.location.href='index.html';return
  }
  // Inject auth bar
  var bar=document.createElement('div');bar.className='auth-bar';
  bar.innerHTML='<div class="user-info"><img src="logo.svg" style="height:clamp(14px,3.5vw,22px);vertical-align:middle;margin-right:6px"><strong>'+u.name+'</strong><span class="role-badge role-'+u.role+'">'+u.role+'</span></div><button class="logout-btn" onclick="snLogout()">ออกจากระบบ</button>';
  document.body.insertBefore(bar,document.body.firstChild);
  document.body.style.paddingTop='44px';
  window.snUser=u;window.snToken=token;
})();
function snLogout(){
  var API='https://script.google.com/macros/s/AKfycbxO6U1vMy2gSOj_1CgZjkzftZh6Vdl9apsbhwQ5TqAub6gfh6EhDQrUKegxI0Mz8Woh/exec';
  var t=sessionStorage.getItem('sn_token');
  fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'auth_logout',token:t})}).catch(function(){});
  sessionStorage.removeItem('sn_token');sessionStorage.removeItem('sn_user');
  window.location.href='login.html';
}
</script>

<div id="toast" class="toast"></div>

<!-- Header -->
<div style="text-align:center;margin:12px 0 20px">
<div style="font-size:16px;font-weight:700;color:#fff">💰 Financial</div>
<div style="font-size:12px;color:#666;margin-top:2px">SN Motorsports — รายรับรายจ่าย</div>
<div style="width:40px;height:3px;background:#22c55e;margin:8px auto 0;border-radius:2px"></div>
</div>

<!-- Tabs -->
<div class="tabs">
<div class="tab active" onclick="switchTab('payment')">บันทึกรายรับ/รายจ่าย</div>
<div class="tab" onclick="switchTab('cashflow')">Cash Flow</div>
</div>

<!-- Payment Tab -->
<div id="tab-payment">
<button class="btn btn-g" onclick="openModal('paymentModal')" style="margin-bottom:10px">+ บันทึกรายรับ/รายจ่าย</button>
<div id="payment-content"><div class="loading"><div class="spinner"></div><div style="margin-top:8px">กำลังโหลด...</div></div></div>
</div>

<!-- Cash Flow Tab -->
<div id="tab-cashflow" style="display:none">
<div class="card" style="margin-bottom:8px;padding:10px">
<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
<input type="date" id="cfFrom" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:4px 8px;border-radius:6px;font-size:13px">
<span style="color:#666">ถึง</span>
<input type="date" id="cfTo" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:4px 8px;border-radius:6px;font-size:13px">
<select id="cfType" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:4px 8px;border-radius:6px;font-size:13px"><option value="">ทั้งหมด</option><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select>
<select id="cfGroup" style="background:#1a1a1a;border:1px solid #333;color:#fff;padding:4px 8px;border-radius:6px;font-size:13px"><option value="month">รายเดือน</option><option value="week">รายสัปดาห์</option><option value="day">รายวัน</option></select>
<button class="btn btn-g" onclick="loadCashFlow()" style="padding:4px 12px;font-size:13px">โหลด</button>
</div>
</div>
<div id="cashflow-content"><div class="loading"><div class="spinner"></div><div style="margin-top:8px">กำลังโหลด Cash Flow...</div></div></div>
</div>

<!-- Bottom nav -->
<div style="margin-top:8px">
<a href="index.html" class="btn btn-o" style="text-decoration:none;display:block;text-align:center">กลับ Hub</a>
</div>

<!-- Record Payment Modal -->
<div class="modal-bg" id="paymentModal">
<div class="modal">
<h3>บันทึกการจ่ายเงิน</h3>
<div class="form-group"><label>ประเภท</label>
<select id="payType">
<option value="expense">รายจ่าย (ซื้อวัตถุดิบ)</option>
<option value="income">รายรับ (ขายสินค้า)</option>
</select></div>
<div class="form-group"><label>จำนวนเงิน (฿)</label>
<input type="number" id="payAmount" min="0" step="0.01" placeholder="0.00"></div>
<div class="form-group"><label>วันที่</label>
<input type="date" id="payDate"></div>
<div class="form-group"><label>หมวดหมู่</label>
<select id="payCategory">
<option value="วัตถุดิบ">วัตถุดิบ</option>
<option value="อะไหล่">อะไหล่/Hardware</option>
<option value="บริการ">บริการ (Finishing/Coating)</option>
<option value="แพ็คเกจ">แพ็คเกจ/บรรจุภัณฑ์</option>
<option value="ค่าส่ง">ค่าส่ง/Shipping</option>
<option value="ค่าแรง">ค่าแรง</option>
<option value="อื่นๆ">อื่นๆ</option>
<option value="ขายสินค้า">ขายสินค้า</option>
<option value="Pre-order">Pre-order</option>
</select></div>
<div class="form-group"><label>Supplier / ลูกค้า</label>
<input type="text" id="paySupplier" placeholder="ชื่อ"></div>
<div class="form-group"><label>เลข Invoice</label>
<input type="text" id="payInvoice" placeholder="ไม่บังคับ"></div>
<div class="form-group"><label>หมายเหตุ</label>
<textarea id="payNotes" placeholder="รายละเอียด"></textarea></div>
<div class="form-group"><label>แนบรูป Invoice (ไม่บังคับ)</label>
<input type="file" id="payFile" accept="image/*" style="padding:8px;background:#0d0d0d;border:1px dashed #333"></div>
<button class="btn btn-g" onclick="submitPayment()" id="payBtn">บันทึก</button>
<button class="btn btn-o" onclick="closeModal('paymentModal')">ยกเลิก</button>
</div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbxO6U1vMy2gSOj_1CgZjkzftZh6Vdl9apsbhwQ5TqAub6gfh6EhDQrUKegxI0Mz8Woh/exec';
var allPayments = [];

function callAPI(params) {
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] || '');
  }).join('&');
  return fetch(API_URL + '?' + qs, { redirect: 'follow' }).then(function(r) { return r.json(); });
}

function postAPI(data) {
  return fetch(API_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data), redirect: 'follow'
  }).then(function(r) { return r.json(); });
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function openModal(id) { document.getElementById(id).className = 'modal-bg show'; }
function closeModal(id) { document.getElementById(id).className = 'modal-bg'; }

function setToday() {
  var d = new Date();
  var s = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  document.getElementById('payDate').value = s;
}

// ── Tab switching ──
var allTabs = ['payment','cashflow'];
function switchTab(tab) {
  allTabs.forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(el, i) {
    el.className = 'tab' + (allTabs[i] === tab ? ' active' : '');
  });
  if (tab === 'payment') loadPayments();
  if (tab === 'cashflow') loadCashFlow();
}

// ── Check URL param ──
var urlTab = new URLSearchParams(window.location.search).get('tab');
if (urlTab && allTabs.indexOf(urlTab) > -1) {
  switchTab(urlTab);
}

// ── Payment Tab ──
function loadPayments() {
  setToday();
  callAPI({ api: 'listPayments' }).then(function(data) { allPayments = data; renderPayments(data); })
  .catch(function() { document.getElementById('payment-content').innerHTML = '<div class="card" style="text-align:center;color:#f87171">โหลดข้อมูลไม่ได้</div>'; });
}

function renderPayments(payments) {
  if (!payments.length) {
    document.getElementById('payment-content').innerHTML = '<div class="card" style="text-align:center;color:#555;padding:24px">ยังไม่มีรายการ</div>';
    return;
  }
  var html = '';
  payments.slice().reverse().forEach(function(p) {
    var isIncome = p.type === 'income';
    html += '<div class="card" style="border-left:3px solid ' + (isIncome ? '#4ade80' : '#f87171') + '">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    html += '<div style="font-weight:600;font-size:13px">' + (p.date || '-') + '</div>';
    html += '<div style="font-weight:700;color:' + (isIncome ? '#4ade80' : '#f87171') + '">' + (isIncome ? '+' : '-') + '฿' + Number(p.amount || 0).toLocaleString('th-TH', {minimumFractionDigits:2}) + '</div>';
    html += '</div>';
    html += '<div style="font-size:13px;color:#ccc">' + (p.category || '-') + '</div>';
    html += '<div style="font-size:12px;color:#666">' + (p.supplier || '') + (p.invoice ? ' · INV: ' + p.invoice : '') + '</div>';
    if (p.notes) html += '<div style="font-size:12px;color:#555;margin-top:2px">' + p.notes + '</div>';
    html += '</div>';
  });
  document.getElementById('payment-content').innerHTML = html;
}

function submitPayment() {
  var amount = parseFloat(document.getElementById('payAmount').value);
  if (!amount || amount <= 0) { toast('ระบุจำนวนเงิน', 'err'); return; }
  var btn = document.getElementById('payBtn');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;

  var data = {
    api: 'recordPayment',
    type: document.getElementById('payType').value,
    amount: amount,
    date: document.getElementById('payDate').value || '',
    category: document.getElementById('payCategory').value,
    supplier: document.getElementById('paySupplier').value || '',
    invoice: document.getElementById('payInvoice').value || '',
    notes: document.getElementById('payNotes').value || ''
  };

  var fileInput = document.getElementById('payFile');
  if (fileInput.files.length > 0) {
    var reader = new FileReader();
    reader.onload = function(e) {
      data.invoiceImage = e.target.result;
      doRecordPayment(data, btn);
    };
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    doRecordPayment(data, btn);
  }
}

function doRecordPayment(data, btn) {
  postAPI(data).then(function(res) {
    if (res.success) { toast('บันทึกแล้ว!'); closeModal('paymentModal'); loadPayments(); document.getElementById('payFile').value = ''; }
    else { toast(res.error || 'บันทึกไม่สำเร็จ', 'err'); }
  }).catch(function(err) {
    callAPI(data).then(function(res) {
      if (res.success) { toast('บันทึกแล้ว!'); closeModal('paymentModal'); loadPayments(); }
      else { toast(res.error || 'บันทึกไม่สำเร็จ', 'err'); }
    }).catch(function(err2) { toast('Error: ' + err2, 'err'); });
  }).finally(function() { btn.innerHTML = 'บันทึก'; btn.disabled = false; });
}

// ── Cash Flow Tab ──
function loadCashFlow() {
  var params = { api: 'listCashflow' };
  var from = document.getElementById('cfFrom').value;
  var to = document.getElementById('cfTo').value;
  var type = document.getElementById('cfType').value;
  var group = document.getElementById('cfGroup').value;
  if (from) params.from = from;
  if (to) params.to = to;
  if (type) params.type = type;
  if (group) params.groupBy = group;
  document.getElementById('cashflow-content').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  callAPI(params).then(function(data) { renderCashFlow(data); })
  .catch(function() { document.getElementById('cashflow-content').innerHTML = '<div class="card" style="text-align:center;color:#f87171">โหลด Cash Flow ไม่ได้</div>'; });
}

function renderCashFlow(data) {
  if (!data || (data.totalIncome === undefined && data.totalExpense === undefined)) {
    document.getElementById('cashflow-content').innerHTML = '<div class="card" style="text-align:center;color:#555;padding:24px">ยังไม่มีข้อมูล Cash Flow</div>';
    return;
  }

  var totalIn = data.totalIncome || 0;
  var totalOut = data.totalExpense || 0;
  var net = data.net || data.balance || (totalIn - totalOut);

  var html = '<div class="card">';
  var txCount = (data.transactions || data.recent || []).length;
  html += '<div style="font-weight:700;margin-bottom:10px">สรุป Cash Flow <span style="color:#666;font-size:12px">(' + (data.count || txCount) + ' รายการ)</span></div>';
  html += '<div class="sum-grid">';
  html += '<div class="sum-item"><div class="n" style="color:#4ade80;font-size:18px">฿' + totalIn.toLocaleString('th-TH') + '</div><div class="hdr">รายรับ</div></div>';
  html += '<div class="sum-item"><div class="n" style="color:#f87171;font-size:18px">฿' + totalOut.toLocaleString('th-TH') + '</div><div class="hdr">รายจ่าย</div></div>';
  html += '<div class="sum-item"><div class="n" style="color:' + (net >= 0 ? '#4ade80' : '#f87171') + ';font-size:18px">฿' + net.toLocaleString('th-TH') + '</div><div class="hdr">คงเหลือ</div></div>';
  html += '</div></div>';

  var grouped = data.grouped || data.monthly || [];
  if (grouped.length) {
    var groupLabel = document.getElementById('cfGroup').value === 'day' ? 'รายวัน' : document.getElementById('cfGroup').value === 'week' ? 'รายสัปดาห์' : 'รายเดือน';
    html += '<div class="card"><div style="font-weight:700;margin-bottom:8px">' + groupLabel + '</div>';
    grouped.forEach(function(m) {
      var pNet = (m.income || 0) - (m.expense || 0);
      html += '<div class="cf-row">';
      html += '<div>' + (m.period || m.month || '-') + '</div>';
      html += '<div><span class="cf-in">+' + (m.income || 0).toLocaleString('th-TH') + '</span> / <span class="cf-out">-' + (m.expense || 0).toLocaleString('th-TH') + '</span>';
      html += ' = <span style="color:' + (pNet >= 0 ? '#4ade80' : '#f87171') + ';font-weight:600">' + pNet.toLocaleString('th-TH') + '</span></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  var transactions = data.transactions || data.recent || [];
  if (transactions.length) {
    html += '<div class="card"><div style="font-weight:700;margin-bottom:8px">รายการ (ล่าสุด 50)</div>';
    transactions.forEach(function(t) {
      var isIn = t.type === 'income';
      var srcBadge = t.source === 'po' ? ' <span style="background:#f59e0b22;color:#f59e0b;padding:1px 5px;border-radius:4px;font-size:10px">PO</span>' : t.source === 'sales' ? ' <span style="background:#22c55e22;color:#22c55e;padding:1px 5px;border-radius:4px;font-size:10px">Sales</span>' : '';
      html += '<div class="cf-row">';
      html += '<div><span style="color:#fff">' + (t.date || '-') + '</span> <span style="color:#666">' + (t.category || '') + '</span>' + srcBadge + '</div>';
      html += '<div style="color:' + (isIn ? '#4ade80' : '#f87171') + ';font-weight:600">' + (isIn ? '+' : '-') + '฿' + Number(t.amount || 0).toLocaleString('th-TH') + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('cashflow-content').innerHTML = html;
}

// ── Init ──
loadPayments();
</script>
</body>
</html>

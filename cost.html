<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SN ERP — Cost Analysis</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"system-ui","Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0;padding:16px;max-width:600px;margin:0 auto}
h2{font-size:1.2rem;margin-bottom:4px}
.subtitle{color:#888;font-size:.82rem;margin-bottom:16px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#aaa;cursor:pointer;font-size:.85rem;transition:.2s;font-family:inherit}
.tab.active{background:#e53935;color:#fff;border-color:#e53935}
.card{background:#141414;border:1px solid #222;border-radius:12px;padding:16px;margin-bottom:16px}
.summary-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.summary-box{flex:1;min-width:130px;background:#1a1a1a;border-radius:10px;padding:14px;text-align:center}
.summary-box .num{font-size:1.25rem;font-weight:700;margin-bottom:2px}
.summary-box .lbl{color:#888;font-size:.73rem}
.nav-back{color:#888;text-decoration:none;font-size:.85rem;display:inline-block;margin-bottom:12px}
.green{color:#4caf50!important}
.red{color:#e53935!important}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-stream{background:rgba(229,57,53,.15);color:#e53935}
.badge-beam{background:rgba(76,175,80,.15);color:#4caf50}
.cost-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:10px}
.cost-table th{text-align:left;color:#888;font-weight:500;padding:8px 4px;border-bottom:1px solid #333}
.cost-table td{padding:7px 4px;border-bottom:1px solid #1a1a1a}
.cost-table tr:last-child td{border-bottom:none}
.cost-table .total-row{font-weight:700}
.cost-table .total-row td{border-top:2px solid #333;padding-top:10px}
.cost-table .num-col{text-align:right;font-variant-numeric:tabular-nums}
.chart-wrap{position:relative;width:100%;margin:10px 0}
.chart-wrap canvas{width:100%!important}
.variant-card{background:#141414;border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.2s}
.variant-card:hover{border-color:#444}
.variant-card.selected{border-color:#e53935}
.v-header{display:flex;justify-content:space-between;align-items:center}
.v-name{font-weight:600;font-size:.92rem}
.v-row{display:flex;justify-content:space-between;margin-top:8px;font-size:.82rem;color:#aaa}
.v-row .val{font-weight:600;color:#e0e0e0}
.progress-bar{height:6px;background:#222;border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
.section-title{font-size:.95rem;font-weight:600;margin-bottom:10px;margin-top:20px}
select.select-box{background:#1a1a1a;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:8px 12px;font-size:.85rem;width:100%;margin-bottom:10px;font-family:inherit}
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.78rem;color:#aaa}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:.85rem;opacity:0;transition:.3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>

<a href="index.html" class="nav-back">&larr; กลับหน้าหลัก</a>
<h2>วิเคราะห์ต้นทุน AURA</h2>
<p class="subtitle">T-spec — ราคาขาย ฿25,900 ทุก Variant</p>

<div class="tabs">
  <button class="tab active" id="tabAll" onclick="setFilter('all')">ทั้งหมด</button>
  <button class="tab" id="tabStream" onclick="setFilter('stream')">Stream</button>
  <button class="tab" id="tabBeam" onclick="setFilter('beam')">Beam</button>
</div>

<div class="summary-row">
  <div class="summary-box"><div class="num" id="sumCost">฿0</div><div class="lbl">ต้นทุนเฉลี่ย</div></div>
  <div class="summary-box"><div class="num green" id="sumProfit">0%</div><div class="lbl">กำไรเฉลี่ย</div></div>
</div>
<div class="summary-row">
  <div class="summary-box"><div class="num" id="sumMin">฿0</div><div class="lbl">ต้นทุนต่ำสุด</div></div>
  <div class="summary-box"><div class="num" id="sumMax">฿0</div><div class="lbl">ต้นทุนสูงสุด</div></div>
</div>

<div class="card">
  <div class="section-title">เปรียบเทียบกำไร (%)</div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#e53935"></span> Stream</div>
    <div class="legend-item"><span class="legend-dot" style="background:#4caf50"></span> Beam</div>
  </div>
  <div class="chart-wrap"><canvas id="chartBar" height="200"></canvas></div>
</div>

<div class="card">
  <div class="section-title">โครงสร้างต้นทุน</div>
  <select class="select-box" id="pieSelect" onchange="drawPie()"></select>
  <div class="chart-wrap"><canvas id="chartPie" height="260"></canvas></div>
  <div id="pieLegend"></div>
</div>

<div class="section-title">รายละเอียดแต่ละ Variant</div>
<div id="variantList"></div>

<div id="detailSection" style="display:none">
  <div class="card" id="detailCard"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var SELL = 25900;
var COST_PER_G = 2.082;
var SHEET_ID = '1RLo_XIeSFy0Uva_o4-ha_VynLCjw_TucP7sxCWi1msY';
var API_URL = 'https://script.google.com/macros/s/AKfycbxO6U1vMy2gSOj_1CgZjkzftZh6Vdl9apsbhwQ5TqAub6gfh6EhDQrUKegxI0Mz8Woh/exec';

var FIXED_ITEMS = [
  {name:'PA12-CF joint', cost:85.28},
  {name:'Lens', cost:2180},
  {name:'Carbon Housing', cost:3500},
  {name:'ABS', cost:144.16},
  {name:'Spring', cost:62.56},
  {name:'Round head M6x30', cost:32},
  {name:'Flush countersink M6x12', cost:430},
  {name:'M6x30 Strut', cost:42},
  {name:'M6 Nylon Nut', cost:15},
  {name:'M6 Heat Insert', cost:86.40},
  {name:'Finishing', cost:500},
  {name:'ขนส่งระหว่างผลิต', cost:1000},
  {name:'ขนส่งถึงลูกค้า', cost:2500},
  {name:'Package', cost:200},
  {name:'CAD/R&D', cost:1295},
  {name:'Marketing', cost:2590},
  {name:'ค่าเสื่อมสภาพเครื่อง', cost:458}
];

var FALLBACK_VARIANTS = [
  {id:'S1', name:'Aura T-spec', type:'stream', arm:214.93, armCost:447.48, matTotal:11224.89, total:15567.89, profit:39.89},
  {id:'S2', name:'Aura A80', type:'stream', arm:183.27, armCost:381.57, matTotal:11158.97, total:15501.97, profit:40.15},
  {id:'S3', name:'Aura FD2R', type:'stream', arm:300.23, armCost:625.08, matTotal:11402.48, total:15745.48, profit:39.21},
  {id:'S4', name:'Aura FL5', type:'stream', arm:285.27, armCost:593.93, matTotal:11371.34, total:15714.34, profit:39.33},
  {id:'B1', name:'Aura EG6', type:'beam', arm:426.83, armCost:888.66, matTotal:11666.06, total:16009.06, profit:38.19},
  {id:'B2', name:'Aura EK9', type:'beam', arm:419.86, armCost:874.15, matTotal:11651.55, total:15994.55, profit:38.24}
];

var VARIANTS = [];
var currentFilter = 'all';
var selectedVariant = null;
var dataSource = 'loading';

/* ===== Dynamic Data Loading ===== */
function buildVariant(name, type, armWeight, sellPrice) {
  var armCost = Math.round(armWeight * COST_PER_G * 100) / 100;
  var fixedSum = FIXED_ITEMS.reduce(function(s,i){return s+i.cost;},0);
  var total = Math.round((fixedSum + armCost) * 100) / 100;
  var overhead = 4343; // CAD/R&D 1295 + Marketing 2590 + ค่าเสื่อม 458
  var matTotal = Math.round((total - overhead) * 100) / 100;
  var profit = sellPrice > 0 ? Math.round((sellPrice - total) / sellPrice * 10000) / 100 : 0;
  var sCount = VARIANTS.filter(function(v){return v.type==='stream'}).length;
  var bCount = VARIANTS.filter(function(v){return v.type==='beam'}).length;
  var id = type === 'beam' ? 'B'+(bCount+1) : 'S'+(sCount+1);
  return {id:id, name:name, type:type, arm:armWeight, armCost:armCost, matTotal:matTotal, total:total, profit:profit};
}

function fetchGviz(tabName) {
  var url = 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(tabName);
  return fetch(url).then(function(r){return r.text();}).then(function(txt){
    var json = JSON.parse(txt.replace(/^[^{]*/, '').replace(/[^}]*$/, ''));
    return json.table ? json.table.rows : [];
  });
}

function loadDynamic() {
  fetchGviz('Config').then(function(rows){
    if(!rows || rows.length < 2) throw new Error('No config data');
    var products = [];
    for(var i=0; i<rows.length; i++){
      var c = rows[i].c;
      if(!c || !c[0] || !c[0].v) continue;
      var tabName = c[0].v.toString().trim();
      if(tabName === 'tab_name') continue; // skip header
      products.push({
        tabName: tabName,
        name: c[1] ? c[1].v.toString().trim() : tabName,
        type: c[2] ? c[2].v.toString().trim() : 'stream',
        sellPrice: c[3] ? parseFloat(c[3].v) : SELL,
        armWeight: c[4] ? parseFloat(c[4].v) : 0
      });
    }
    if(products.length === 0) throw new Error('No products found');
    VARIANTS = [];
    products.forEach(function(p){
      SELL = p.sellPrice || SELL;
      VARIANTS.push(buildVariant(p.name, p.type, p.armWeight, p.sellPrice));
    });
    dataSource = 'gviz';
    document.querySelector('.subtitle').textContent = 'Dynamic — ราคาขาย ฿'+fmtShort(SELL)+' ทุก Variant (Live)';
    render();
  }).catch(function(e){
    console.warn('Gviz failed, trying API...', e);
    loadFromAPI();
  });
}

function loadFromAPI() {
  fetch(API_URL+'?api=getProducts').then(function(r){return r.json();}).then(function(data){
    if(!data.success || !data.products || data.products.length===0) throw new Error('API failed');
    VARIANTS = [];
    data.products.forEach(function(p){
      var armW = p.arm || 0;
      var sp = p.sellPrice || SELL;
      SELL = sp;
      VARIANTS.push(buildVariant(p.name, p.type, armW, sp));
    });
    dataSource = 'api';
    document.querySelector('.subtitle').textContent = 'API — ราคาขาย ฿'+fmtShort(SELL)+' ทุก Variant';
    render();
  }).catch(function(e){
    console.warn('API failed, using fallback', e);
    useFallback();
  });
}

function useFallback() {
  VARIANTS = FALLBACK_VARIANTS.slice();
  dataSource = 'fallback';
  document.querySelector('.subtitle').textContent = 'Offline — ราคาขาย ฿'+fmtShort(SELL)+' ทุก Variant';
  render();
}

function fmt(n){ return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtShort(n){ return n.toLocaleString('th-TH',{maximumFractionDigits:0}); }

function filtered(){
  if(currentFilter==='all') return VARIANTS;
  return VARIANTS.filter(function(v){return v.type===currentFilter;});
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.tabs .tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('tab'+f.charAt(0).toUpperCase()+f.slice(1)).classList.add('active');
  selectedVariant = null;
  document.getElementById('detailSection').style.display='none';
  render();
}

function render(){
  updateSummary();
  drawBarChart();
  populatePieSelect();
  drawPie();
  renderVariants();
}

function updateSummary(){
  var list = filtered();
  var avg = list.reduce(function(s,v){return s+v.total;},0)/list.length;
  var avgP = list.reduce(function(s,v){return s+v.profit;},0)/list.length;
  var mn = Math.min.apply(null,list.map(function(v){return v.total;}));
  var mx = Math.max.apply(null,list.map(function(v){return v.total;}));
  document.getElementById('sumCost').textContent = '฿'+fmtShort(avg);
  document.getElementById('sumProfit').textContent = avgP.toFixed(2)+'%';
  document.getElementById('sumMin').textContent = '฿'+fmtShort(mn);
  document.getElementById('sumMax').textContent = '฿'+fmtShort(mx);
}

function drawBarChart(){
  var c = document.getElementById('chartBar');
  var dpr = window.devicePixelRatio||1;
  var w = c.parentElement.clientWidth;
  var h = 200;
  c.width = w*dpr; c.height = h*dpr;
  c.style.width = w+'px'; c.style.height = h+'px';
  var ctx = c.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  var list = filtered();
  var n = list.length;
  if(!n) return;
  var pad = 40, right=16, top=20, bot=40;
  var cw = (w-pad-right)/n;
  var barW = Math.min(cw*0.6, 36);
  var minP = 36, maxP = 42;

  ctx.strokeStyle='#222'; ctx.lineWidth=1;
  ctx.fillStyle='#666'; ctx.font='11px sans-serif'; ctx.textAlign='right';
  for(var i=0;i<=3;i++){
    var val = minP + i*2;
    var y = top + (1-(val-minP)/(maxP-minP))*(h-top-bot);
    ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(w-right,y); ctx.stroke();
    ctx.fillText(val+'%', pad-4, y+4);
  }

  list.forEach(function(v,i){
    var x = pad + i*cw + cw/2 - barW/2;
    var ratio = (v.profit-minP)/(maxP-minP);
    var barH = ratio*(h-top-bot);
    var y = h-bot-barH;
    var color = v.type==='stream'?'#e53935':'#4caf50';

    ctx.fillStyle = color;
    roundRect(ctx, x, y, barW, barH, 4);
    ctx.fill();

    ctx.fillStyle='#e0e0e0'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(v.profit.toFixed(1)+'%', x+barW/2, y-6);

    ctx.fillStyle='#888'; ctx.font='10px sans-serif';
    ctx.fillText(v.id, x+barW/2, h-bot+14);
    ctx.fillText(v.arm.toFixed(0)+'g', x+barW/2, h-bot+26);
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);
  ctx.lineTo(x,y+h);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function populatePieSelect(){
  var sel = document.getElementById('pieSelect');
  var list = filtered();
  sel.innerHTML = '';
  list.forEach(function(v){
    var o = document.createElement('option');
    o.value = v.id;
    o.textContent = v.name + ' (ARM '+v.arm+'g)';
    sel.appendChild(o);
  });
}

function drawPie(){
  var sel = document.getElementById('pieSelect');
  var vid = sel.value;
  var v = VARIANTS.find(function(x){return x.id===vid;});
  if(!v) return;

  var groups = [
    {name:'PA12-CF ARM', val:v.armCost, color:'#e53935'},
    {name:'PA12-CF joint', val:85.28, color:'#f44336'},
    {name:'Lens', val:2180, color:'#2196f3'},
    {name:'Carbon Housing', val:3500, color:'#1976d2'},
    {name:'อะไหล่/น็อต', val:144.16+62.56+32+430+42+15+86.40, color:'#ff9800'},
    {name:'Finishing', val:500, color:'#9c27b0'},
    {name:'ขนส่ง', val:1000+2500, color:'#00bcd4'},
    {name:'Package', val:200, color:'#607d8b'},
    {name:'CAD/R&D', val:1295, color:'#8bc34a'},
    {name:'Marketing', val:2590, color:'#ffeb3b'},
    {name:'ค่าเสื่อม', val:458, color:'#795548'}
  ];
  var total = groups.reduce(function(s,g){return s+g.val;},0);

  var c = document.getElementById('chartPie');
  var dpr = window.devicePixelRatio||1;
  var w = c.parentElement.clientWidth;
  var h = 260;
  c.width = w*dpr; c.height = h*dpr;
  c.style.width = w+'px'; c.style.height = h+'px';
  var ctx = c.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  var cx = w/2, cy = 120, R = 90, r = 50;
  var angle = -Math.PI/2;

  groups.forEach(function(g){
    var slice = (g.val/total)*Math.PI*2;
    ctx.beginPath();
    ctx.arc(cx,cy,R,angle,angle+slice);
    ctx.arc(cx,cy,r,angle+slice,angle,true);
    ctx.closePath();
    ctx.fillStyle = g.color;
    ctx.fill();
    angle += slice;
  });

  ctx.fillStyle='#e0e0e0'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
  ctx.fillText('฿'+fmtShort(total), cx, cy-2);
  ctx.fillStyle='#888'; ctx.font='11px sans-serif';
  ctx.fillText('ต้นทุนรวม', cx, cy+14);

  var leg = document.getElementById('pieLegend');
  leg.innerHTML = '';
  groups.forEach(function(g){
    var pct = ((g.val/total)*100).toFixed(1);
    leg.innerHTML += '<div class="legend-item"><span class="legend-dot" style="background:'+g.color+'"></span>'+g.name+' ฿'+fmtShort(g.val)+' ('+pct+'%)</div>';
  });
  leg.style.cssText='display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:6px';
}

function renderVariants(){
  var list = filtered();
  var html = '';
  list.forEach(function(v){
    var color = v.type==='stream'?'#e53935':'#4caf50';
    var badge = v.type==='stream'?'badge-stream':'badge-beam';
    var label = v.type==='stream'?'Stream':'Beam';
    var profitAmt = SELL - v.total;
    var sel = selectedVariant===v.id?' selected':'';
    html += '<div class="variant-card'+sel+'" onclick="selectVariant(\''+v.id+'\')">';
    html += '<div class="v-header"><span class="v-name">'+v.name+'</span><span class="badge '+badge+'">'+label+'</span></div>';
    html += '<div class="v-row"><span>ARM: '+v.arm+'g</span><span>ต้นทุน: <span class="val">฿'+fmt(v.total)+'</span></span></div>';
    html += '<div class="v-row"><span>กำไร: <span class="val green">฿'+fmt(profitAmt)+'</span></span><span>Margin: <span class="val green">'+v.profit+'%</span></span></div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:'+v.profit+'%;background:'+color+'"></div></div>';
    html += '</div>';
  });
  document.getElementById('variantList').innerHTML = html;
}

function selectVariant(id){
  if(selectedVariant===id){
    selectedVariant=null;
    document.getElementById('detailSection').style.display='none';
    renderVariants();
    return;
  }
  selectedVariant = id;
  renderVariants();
  var v = VARIANTS.find(function(x){return x.id===id;});
  if(!v) return;

  var html = '<div class="section-title" style="margin-top:0">รายละเอียดต้นทุน — '+v.name+'</div>';
  html += '<table class="cost-table">';
  html += '<tr><th>#</th><th>รายกาย</th><th class="num-col">ต้นทุน (฿)</th></tr>';
  html += '<tr><td>1</td><td>PA12-CF ARM ('+v.arm+'g)</td><td class="num-col">'+fmt(v.armCost)+'</td></tr>';
  FIXED_ITEMS.forEach(function(item,i){
    html += '<tr><td>'+(i+2)+'</td><td>'+item.name+'</td><td class="num-col">'+fmt(item.cost)+'</td></tr>';
  });
  html += '<tr class="total-row"><td></td><td>ต้นทุนวัสดุรวม</td><td class="num-col">'+fmt(v.matTotal)+'</td></tr>';
  html += '<tr class="total-row"><td></td><td>ต้นทุนรวมทั้งหมด</td><td class="num-col" style="color:#e53935">'+fmt(v.total)+'</td></tr>';
  html += '<tr class="total-row"><td></td><td>กำไรสุทธิ</td><td class="num-col green">'+fmt(SELL-v.total)+' ('+v.profit+'%)</td></tr>';
  html += '</table>';

  document.getElementById('detailCard').innerHTML = html;
  document.getElementById('detailSection').style.display='block';
  document.getElementById('detailSection').scrollIntoView({behavior:'smooth',block:'start'});
}

/* Auth guard */
(function(){
  var t = localStorage.getItem('sn_token') || sessionStorage.getItem('sn_token');
  if(!t){ window.location.href='login.html'; return; }
})();

loadDynamic();
window.addEventListener('resize', function(){ if(VARIANTS.length) { drawBarChart(); drawPie(); } });
</script>
</body>
</html>

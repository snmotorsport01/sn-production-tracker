*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;background:#0a0a0a;color:#e5e5e5;padding:16px;max-width:600px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:60px}
.hdr{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.card{background:#151515;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #1e1e1e}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;text-align:center;cursor:pointer;border:none;margin-bottom:8px;transition:.12s;-webkit-appearance:none}
.btn:active{transform:scale(.97);opacity:.8}
.btn-p{background:#DC2626;color:#fff}
.btn-g{background:#22c55e;color:#000}
.btn-o{background:transparent;color:#aaa;border:1px solid #333}
.btn-w{background:#f59e0b;color:#000}
.btn-d{background:#ef4444;color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-block;margin:0}
.btn-xs{padding:4px 10px;font-size:11px;width:auto;display:inline-block;margin:0;border-radius:8px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #333;border-top-color:#DC2626;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:#555}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-ok{background:#0a2a1a;color:#4ade80}
.b-low{background:#2a1a00;color:#f59e0b}
.b-crit{background:#2d1010;color:#f87171}
.b-out{background:#1a1a1a;color:#666}
.b-draft{background:#1a1a2d;color:#818cf8}
.b-ordered{background:#1a2a1a;color:#4ade80}
.b-received{background:#2a2a00;color:#f59e0b}
.b-closed{background:#1a1a1a;color:#666}

.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.sum-item{background:#0d0d0d;border-radius:10px;padding:12px;text-align:center;border:1px solid #1e1e1e}
.sum-item .n{font-size:24px;font-weight:800}

.stock-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a}

.stock-bar-fill{height:100%;border-radius:3px;transition:.3s}
.stock-btns{display:flex;gap:4px;flex-shrink:0}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#151515;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;border:1px solid #1e1e1e;border-bottom:none}
.modal h3{font-size:16px;margin-bottom:14px}
.form-group{margin-bottom:12px}

.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#fff;font-size:14px;-webkit-appearance:none}

.tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}

.tab{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid #333;background:transparent;color:#888;transition:.15s;flex-shrink:0}
.tab.active{background:#DC2626;color:#fff;border-color:#DC2626}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;transition:.3s;opacity:0;pointer-events:none;max-width:90%;background:#22c55e;color:#000}
.toast.err{background:#ef4444;color:#fff}
.toast.warn{background:#f59e0b;color:#000}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.po-status{font-size:11px;text-transform:uppercase;font-weight:600}
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;background:#0d0d0d;color:#fff;font-size:14px;margin-bottom:10px;-webkit-appearance:none}

.cf-in{color:#4ade80}.cf-out{color:#f87171}

.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:#DC2626;color:#fff;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(220,38,38,.4);z-index:50;display:none;align-items:center;justify-content:center}
.fab:active{transform:scale(.9)}

.auth-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1a1a;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;font-size:.8rem}

.auth-bar .logout-btn:hover{border-color:#e74c3c;color:#e74c3c}
</style>

<body><script>
(function(){
  var token=sessionStorage.getItem('sn_token');
  var userStr=sessionStorage.getItem('sn_user');
  if(!token||!userStr){window.location.href='login.html';return}
  try{var u=JSON.parse(userStr)}catch(e){window.location.href='login.html';return}
  // Permission check per page
  var page=window.location.pathname.split('/').pop()||'index.html';
  var perms={
    'index.html':['admin','manager','operator'],
    'production.html':['admin','manager','operator'],
    'inventory.html':['admin','manager'],
    'finance.html':['admin'],
    'qr.html':['admin','manager','operator'],
    'report.html':['admin','manager']
  };
  var allowed=perms[page]||['admin'];
  if(allowed.indexOf(u.role)===-1){
    alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้ (ต้องการ: '+allowed.join('/')+')');
    window.location.href='index.html';return
  }
  // Inject auth bar
  var bar=document.createElement('div');bar.className='auth-bar';
  bar.innerHTML='<div class="user-info">👤 <strong>'+u.name+'</strong><span class="role-badge role-'+u.role+'">'+u.role+'</span></div><button class="logout-btn" onclick="snLogout()">ออกจากระบบ</button>';
  document.body.insertBefore(bar,document.body.firstChild);
  document.body.style.paddingTop='44px';
  window.snUser=u;window.snToken=token;
})();
function snLogout(){
  var API='https://script.google.com/macros/s/AKfycbxO6U1vMy2gSOj_1CgZjkzftZh6Vdl9apsbhwQ5TqAub6gfh6EhDQrUKegxI0Mz8Woh/exec';
  var t=sessionStorage.getItem('sn_token');
  fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'auth_logout',token:t})}).catch(function(){});
  sessionStorage.removeItem('sn_token');sessionStorage.removeItem('sn_user');
  window.location.href='login.html';
}
</script>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbxO6U1vMy2gSOj_1CgZjkzftZh6Vdl9apsbhwQ5TqAub6gfh6EhDQrUKegxI0Mz8Woh/exec';
var allInventory = [];
var allPOs = [];
var bomData = [];
var currentItem = null;

function callAPI(params) {
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] || '');
  }).join('&');
  return fetch(API_URL + '?' + qs, { redirect: 'follow' }).then(function(r) { return r.json(); });
}

function postAPI(data) {
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data),
    redirect: 'follow'
  }).then(function(r) { return r.json(); });
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function openModal(id) { document.getElementById(id).className = 'modal-bg show'; }
function closeModal(id) { document.getElementById(id).className = 'modal-bg'; currentItem = null; }

// ── Tab switching ──
var allTabs = ['stock','alerts','po','bom'];
function switchTab(tab) {
  allTabs.forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(el, i) {
    el.className = 'tab' + (allTabs[i] === tab ? ' active' : '');
  });
  if (tab === 'alerts') loadAlerts();
  if (tab === 'po') loadPOs();
  if (tab === 'bom') loadBOM();
}

// ── Stock List ──
function loadInventory() {
  callAPI({ api: 'listInventory' }).then(function(data) {
    allInventory = data;
    renderStock(data);
    updateAlertBadge(data);
  }).catch(function(err) {
    document.getElementById('stock-content').innerHTML =
      '<div class="card" style="text-align:center;color:#f87171">โหลดข้อมูลไม่ได้<br><span style="font-size:13px">' + err + '</span></div>' +
      '<button class="btn btn-o" onclick="loadInventory()">ลองใหม่</button>';
  });
}

function getStockStatus(stock, min) {
  if (stock <= 0) return { label: 'หมด', cls: 'b-out', color: '#666' };
  if (stock <= min * 0.5) return { label: 'วิกฤต', cls: 'b-crit', color: '#f87171' };
  if (stock <= min) return { label: 'ต่ำ', cls: 'b-low', color: '#f59e0b' };
  return { label: 'OK', cls: 'b-ok', color: '#4ade80' };
}

function renderStock(items) {
  if (!items.length) {
    document.getElementById('stock-content').innerHTML =
      '<div class="card" style="text-align:center;color:#555;padding:24px">ยังไม่มีรายการวัตถุดิบ</div>';
    return;
  }

  var ok = 0, low = 0, crit = 0;
  items.forEach(function(it) {
    var s = getStockStatus(it.stock, it.min);
    if (s.label === 'OK') ok++;
    else if (s.label === 'ต่ำ') low++;
    else crit++;
  });

  var html = '<div class="card">';
  html += '<div class="sum-grid">';
  html += '<div class="sum-item"><div class="n" style="color:#4ade80">' + ok + '</div><div class="hdr">OK</div></div>';
  html += '<div class="sum-item"><div class="n" style="color:#f59e0b">' + low + '</div><div class="hdr">ต่ำ</div></div>';
  html += '<div class="sum-item"><div class="n" style="color:#f87171">' + crit + '</div><div class="hdr">วิกฤต</div></div>';
  html += '</div></div>';

  html += '<div class="card" id="stockList">';
  items.forEach(function(it, idx) {
    var s = getStockStatus(it.stock, it.min);
    var maxVal = it.max || (it.min * 3) || 100;
    var pct = Math.min(100, Math.round((it.stock / maxVal) * 100));
    html += '<div class="stock-row" data-name="' + (it.item || '').toLowerCase() + '">';
    html += '<div class="stock-info">';
    html += '<div class="stock-name">' + (it.item || 'Unknown') + '</div>';
    html += '<div class="stock-meta">' + (it.category || '-') + ' · Min: ' + (it.min || 0) + ' · ' + (it.unit || '-') + '</div>';
    html += '<div class="stock-bar"><div class="stock-bar-fill" style="width:' + pct + '%;background:' + s.color + '"></div></div>';
    html += '</div>';
    html += '<div class="stock-qty"><div class="n" style="color:' + s.color + '">' + (it.stock || 0) + '</div>';
    html += '<span class="badge ' + s.cls + '">' + s.label + '</span></div>';
    html += '<div class="stock-btns">';
    html += '<button class="btn btn-xs" style="background:#22c55e;color:#000" onclick="openRestock(' + idx + ')">+</button>';
    html += '<button class="btn btn-xs" style="background:#ef4444;color:#fff" onclick="openDeduct(' + idx + ')">−</button>';
    html += '<button class="btn btn-xs" style="background:#3b82f633;color:#60a5fa;font-size:10px" onclick="openEditItem(' + idx + ')">✎</button>';
    html += '<button class="btn btn-xs" style="background:#44444466;color:#888;font-size:10px" onclick="deleteItem(' + idx + ')">✕</button>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  document.getElementById('stock-content').innerHTML = html;
}

function filterStock(q) {
  q = q.toLowerCase();
  var rows = document.querySelectorAll('.stock-row');
  rows.forEach(function(row) {
    row.style.display = row.getAttribute('data-name').indexOf(q) >= 0 ? 'flex' : 'none';
  });
}

// ── Delete Item (Soft Delete) ──
function deleteItem(idx) {
  var it = allInventory[idx];
  if (!it) return;
  if (!confirm('ลบ "' + it.item + '" จาก Inventory?\n\n(Soft delete — สามารถกู้คืนได้จาก Google Sheets)')) return;
  callAPI({ api: 'deleteInventoryItem', item: it.item })
  .then(function(res) {
    if (res.success) { toast('ลบ ' + it.item + ' แล้ว', 'warn'); loadInventory(); }
    else { toast(res.error || 'ลบไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); });
}

// ── Edit Item ──
function openEditItem(idx) {
  var it = allInventory[idx];
  if (!it) return;
  document.getElementById('editOriginalName').value = it.item;
  document.getElementById('editItemName').value = it.item;
  document.getElementById('editItemCategory').value = it.category || 'Material';
  document.getElementById('editItemUnit').value = it.unit || '';
  document.getElementById('editItemMin').value = it.min || 0;
  document.getElementById('editItemMax').value = it.max || 0;
  document.getElementById('editItemCost').value = it.unitCost || 0;
  document.getElementById('editItemSupplier').value = it.supplier || '';
  openModal('editItemModal');
}

function submitEditItem() {
  var originalName = document.getElementById('editOriginalName').value;
  if (!originalName) return;

  var params = { api: 'updateInventoryItem', item: originalName };
  var newName = document.getElementById('editItemName').value.trim();
  if (newName && newName !== originalName) params.newName = newName;
  params.category = document.getElementById('editItemCategory').value;
  params.unit = document.getElementById('editItemUnit').value;
  params.min = document.getElementById('editItemMin').value;
  params.max = document.getElementById('editItemMax').value;
  params.unitCost = document.getElementById('editItemCost').value;
  params.supplier = document.getElementById('editItemSupplier').value;

  var btn = document.getElementById('editItemBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#f59e0b"></div>';
  btn.disabled = true;

  callAPI(params).then(function(res) {
    if (res.success) {
      var msg = 'แก้ไขแล้ว';
      if (res.changes && res.changes.length) {
        msg += ': ' + res.changes.map(function(c) { return c.field; }).join(', ');
      }
      toast(msg); closeModal('editItemModal'); loadInventory();
    } else { toast(res.error || 'แก้ไขไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); })
  .finally(function() { btn.innerHTML = 'บันทึกการแก้ไข'; btn.disabled = false; });
}

function updateAlertBadge(items) {
  var count = 0;
  items.forEach(function(it) {
    var s = getStockStatus(it.stock, it.min);
    if (s.label !== 'OK') count++;
  });
  var badge = document.getElementById('alertBadge');
  if (count > 0) { badge.textContent = count; badge.style.display = 'inline'; }
  else { badge.style.display = 'none'; }
}

// ── Restock (+) ──
function openRestock(idx) {
  var it = allInventory[idx];
  currentItem = it;
  document.getElementById('restockItem').value = it.item;
  document.getElementById('restockCurrent').value = it.stock + ' ' + (it.unit || '');
  document.getElementById('restockQty').value = '';
  document.getElementById('restockCost').value = it.unitCost || '';
  document.getElementById('restockSupplier').value = it.supplier || '';
  document.getElementById('restockNotes').value = '';
  openModal('restockModal');
}

function submitRestock() {
  if (!currentItem) return;
  var qty = parseInt(document.getElementById('restockQty').value);
  if (!qty || qty <= 0) { toast('ระบุจำนวนที่ถูกต้อง', 'err'); return; }
  var btn = document.getElementById('restockBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#22c55e"></div> กำลังบันทึก...';
  btn.disabled = true;
  callAPI({
    api: 'restockItem', item: currentItem.item, qty: qty,
    cost: document.getElementById('restockCost').value || '',
    supplier: document.getElementById('restockSupplier').value || '',
    notes: document.getElementById('restockNotes').value || ''
  }).then(function(res) {
    if (res.success) { toast('เพิ่มสต็อก ' + qty + ' ' + (currentItem.unit||'') + ' ของ ' + currentItem.item); closeModal('restockModal'); loadInventory(); }
    else { toast(res.error || 'เพิ่มไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); })
  .finally(function() { btn.innerHTML = 'ยืนยันเพิ่มสต็อก'; btn.disabled = false; });
}

// ── Deduct (-) ──
function openDeduct(idx) {
  var it = allInventory[idx];
  currentItem = it;
  document.getElementById('deductItem').value = it.item;
  document.getElementById('deductCurrent').value = it.stock + ' ' + (it.unit || '');
  document.getElementById('deductQty').value = '';
  document.getElementById('deductNotes').value = '';
  openModal('deductModal');
}

function submitDeduct() {
  if (!currentItem) return;
  var qty = parseInt(document.getElementById('deductQty').value);
  if (!qty || qty <= 0) { toast('ระบุจำนวนที่ถูกต้อง', 'err'); return; }
  if (qty > currentItem.stock) { toast('หักเกินสต็อก (มี ' + currentItem.stock + ')', 'err'); return; }
  var btn = document.getElementById('deductBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#ef4444"></div> กำลังบันทึก...';
  btn.disabled = true;
  callAPI({
    api: 'deductItem', item: currentItem.item, qty: qty,
    reason: document.getElementById('deductReason').value || '',
    notes: document.getElementById('deductNotes').value || ''
  }).then(function(res) {
    if (res.success) { toast('หักสต็อก ' + qty + ' ' + (currentItem.unit||'') + ' ของ ' + currentItem.item, 'warn'); closeModal('deductModal'); loadInventory(); }
    else { toast(res.error || 'หักไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); })
  .finally(function() { btn.innerHTML = 'ยืนยันหักสต็อก'; btn.disabled = false; });
}

// ── Add New Item ──
function submitAddItem() {
  var name = document.getElementById('newItemName').value.trim();
  if (!name) { toast('ระบุชื่อรายการ', 'err'); return; }
  var btn = document.getElementById('addItemBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#22c55e"></div>';
  btn.disabled = true;
  callAPI({
    api: 'addInventoryItem', item: name,
    category: document.getElementById('newItemCategory').value,
    unit: document.getElementById('newItemUnit').value || '',
    min: document.getElementById('newItemMin').value || '0',
    max: document.getElementById('newItemMax').value || '0',
    stock: document.getElementById('newItemStock').value || '0',
    unitCost: document.getElementById('newItemCost').value || '0',
    supplier: document.getElementById('newItemSupplier').value || ''
  }).then(function(res) {
    if (res.success) { toast('เพิ่ม ' + name + ' แล้ว'); closeModal('addItemModal'); loadInventory(); }
    else { toast(res.error || 'เพิ่มไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); })
  .finally(function() { btn.innerHTML = 'เพิ่มรายการ'; btn.disabled = false; });
}

// ── Alerts Tab ──
function loadAlerts() {
  var items = allInventory;
  if (!items.length) { callAPI({ api: 'listInventory' }).then(function(d) { allInventory = d; renderAlerts(d); }); return; }
  renderAlerts(items);
}

function renderAlerts(items) {
  var alerts = items.filter(function(it) { return getStockStatus(it.stock, it.min).label !== 'OK'; });
  if (!alerts.length) {
    document.getElementById('alerts-content').innerHTML =
      '<div class="card" style="text-align:center;padding:24px"><div style="font-size:28px;margin-bottom:8px">✓</div><div style="color:#4ade80;font-weight:600">สต็อกทั้งหมดปกติ</div></div>';
    return;
  }
  var html = '<div class="card" style="border-color:#f59e0b33">';
  html += '<div style="font-weight:700;margin-bottom:10px;color:#f59e0b">' + alerts.length + ' รายการต้องเติม</div>';
  alerts.sort(function(a, b) { return (a.stock / (a.min || 1)) - (b.stock / (b.min || 1)); });
  alerts.forEach(function(it) {
    var s = getStockStatus(it.stock, it.min);
    var deficit = Math.max(0, (it.max || it.min * 2) - it.stock);
    html += '<div class="stock-row">';
    html += '<div class="stock-info">';
    html += '<div class="stock-name" style="color:' + s.color + '">' + it.item + '</div>';
    html += '<div class="stock-meta">มี: ' + it.stock + ' / ขั้นต่ำ: ' + it.min + ' · ต้องสั่ง: ' + deficit + ' ' + (it.unit || '') + '</div>';
    html += '</div>';
    html += '<span class="badge ' + s.cls + '">' + s.label + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<button class="btn btn-w" onclick="createPOFromAlerts()">สร้าง PO จากรายการที่ต้องเติม</button>';
  document.getElementById('alerts-content').innerHTML = html;
}

function createPOFromAlerts() {
  var lowItems = allInventory.filter(function(it) { return getStockStatus(it.stock, it.min).label !== 'OK'; });
  if (!lowItems.length) { toast('ไม่มีรายการที่ต้องเติม', 'warn'); return; }
  var itemsList = lowItems.map(function(it) {
    var need = Math.max(0, (it.max || it.min * 2) - it.stock);
    return it.item + ' x' + need;
  }).join(', ');
  var suppliers = [];
  lowItems.forEach(function(it) { if (it.supplier && suppliers.indexOf(it.supplier) < 0) suppliers.push(it.supplier); });
  callAPI({ api: 'createPODraft', items: itemsList, suppliers: suppliers.join(', ') || 'TBD', urgency: 'High' })
  .then(function(res) {
    if (res.success) { toast('สร้าง PO แล้ว!'); switchTab('po'); }
    else { toast(res.error || 'สร้างไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); });
}

// ── PO Tab ──
function loadPOs() {
  callAPI({ api: 'listPODrafts' }).then(function(data) { allPOs = data; renderPOs(data); })
  .catch(function() { document.getElementById('po-content').innerHTML = '<div class="card" style="text-align:center;color:#f87171">โหลด PO ไม่ได้</div>'; });
}

function renderPOs(pos) {
  if (!pos.length) {
    document.getElementById('po-content').innerHTML = '<div class="card" style="text-align:center;color:#555;padding:24px">ยังไม่มี PO</div>';
    return;
  }
  var html = '';
  pos.forEach(function(po, idx) {
    var urgColor = po.urgency === 'High' ? '#f87171' : po.urgency === 'Medium' ? '#f59e0b' : '#4ade80';
    var stCls = 'b-' + (po.status || 'draft').toLowerCase();
    html += '<div class="card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html += '<div style="font-weight:600;font-size:14px">' + (po.date || '-') + '</div>';
    html += '<div><span class="badge" style="background:' + urgColor + '22;color:' + urgColor + '">' + (po.urgency || '-') + '</span>';
    html += ' <span class="badge ' + stCls + '">' + (po.status || 'Draft') + '</span></div>';
    html += '</div>';
    html += '<div style="font-size:13px;color:#ccc;margin-bottom:4px">' + (po.items || '-') + '</div>';
    html += '<div style="font-size:12px;color:#666;margin-bottom:8px">Suppliers: ' + (po.suppliers || '-') + '</div>';
    html += '<div style="display:flex;gap:6px">';
    if ((po.status || 'Draft') === 'Draft') {
      html += '<button class="btn btn-xs b-ordered" onclick="updatePOStatus(' + idx + ',\'Ordered\')">สั่งแล้ว</button>';
    } else if (po.status === 'Ordered') {
      html += '<button class="btn btn-xs b-received" onclick="updatePOStatus(' + idx + ',\'Received\')">รับของแล้ว</button>';
    } else if (po.status === 'Received') {
      html += '<button class="btn btn-xs b-closed" onclick="updatePOStatus(' + idx + ',\'Closed\')">ปิด PO</button>';
    }
    html += '<button class="btn btn-xs" style="background:#ef444433;color:#f87171" onclick="deletePO(' + idx + ')">ลบ</button>';
    html += '</div></div>';
  });
  document.getElementById('po-content').innerHTML = html;
}

function submitCreatePO() {
  var items = document.getElementById('poItems').value.trim();
  if (!items) { toast('ระบุรายการสั่งซื้อ', 'err'); return; }
  var btn = document.getElementById('createPOBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#f59e0b"></div>';
  btn.disabled = true;
  callAPI({
    api: 'createPODraft', items: items,
    suppliers: document.getElementById('poSupplier').value || 'TBD',
    urgency: document.getElementById('poUrgency').value,
    notes: document.getElementById('poNotes').value || ''
  }).then(function(res) {
    if (res.success) { toast('สร้าง PO แล้ว!'); closeModal('createPOModal'); loadPOs(); }
    else { toast(res.error || 'สร้างไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); })
  .finally(function() { btn.innerHTML = 'สร้าง PO'; btn.disabled = false; });
}

function updatePOStatus(idx, newStatus) {
  var po = allPOs[idx];
  if (!po) return;
  callAPI({ api: 'updatePOStatus', row: po.row || (idx + 2), status: newStatus })
  .then(function(res) {
    if (res.success) { toast('อัพเดตเป็น ' + newStatus); loadPOs(); }
    else { toast(res.error || 'อัพเดตไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); });
}

function deletePO(idx) {
  var po = allPOs[idx];
  if (!po) return;
  if (!confirm('ลบ PO นี้?')) return;
  callAPI({ api: 'deletePO', row: po.row || (idx + 2) })
  .then(function(res) {
    if (res.success) { toast('ลบ PO แล้ว'); loadPOs(); }
    else { toast(res.error || 'ลบไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); });
}

// ── BOM Tab ──
function loadBOM() {
  callAPI({ api: 'listBOM' }).then(function(data) { bomData = data; renderBOM(data); })
  .catch(function() { document.getElementById('bom-content').innerHTML = '<div class="card" style="text-align:center;color:#f87171">โหลด BOM ไม่ได้</div>'; });
}

function renderBOM(items) {
  if (!items.length) {
    document.getElementById('bom-content').innerHTML = '<div class="card" style="text-align:center;color:#555;padding:24px">ยังไม่มีข้อมูล BOM</div>';
    return;
  }
  var totalCost = 0;
  var html = '<div class="card">';
  html += '<div style="font-weight:700;margin-bottom:4px">SN Mirror — Bill of Materials</div>';
  html += '<div style="font-size:12px;color:#666;margin-bottom:10px">วัตถุดิบต่อ 1 ชิ้นงาน</div>';
  items.forEach(function(it, idx) {
    var cost = parseFloat(it.cost) || 0;
    totalCost += cost;
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a1a;font-size:13px">';
    html += '<div style="flex:1"><span style="color:#fff">' + it.item + '</span> <span style="color:#666">x' + it.qty + ' ' + (it.unit || '') + '</span></div>';
    html += '<div style="color:#f59e0b;font-weight:600;margin:0 8px">฿' + cost.toLocaleString('th-TH', {minimumFractionDigits:2}) + '</div>';
    html += '<button class="btn btn-xs" style="background:#ef444433;color:#f87171" onclick="deleteBOM(' + idx + ')">✕</button>';
    html += '</div>';
  });
  html += '<div style="display:flex;justify-content:space-between;padding:10px 0 4px;font-weight:700;font-size:14px;border-top:2px solid #333;margin-top:4px">';
  html += '<div>รวมต่อชิ้น</div>';
  html += '<div style="color:#DC2626">฿' + totalCost.toLocaleString('th-TH', {minimumFractionDigits:2}) + '</div>';
  html += '</div></div>';

  // Deduction calculator
  html += '<div class="card">';
  html += '<div style="font-weight:700;margin-bottom:8px">คำนวณวัตถุดิบ</div>';
  html += '<div class="form-group"><label>จำนวนที่ผลิต</label>';
  html += '<input type="number" id="bomCalcQty" min="1" value="1" onchange="calcBOM()" oninput="calcBOM()"></div>';
  html += '<div id="bomCalcResult"></div>';
  html += '</div>';

  document.getElementById('bom-content').innerHTML = html;
  calcBOM();
}

function calcBOM() {
  var qty = parseInt(document.getElementById('bomCalcQty').value) || 1;
  var html = '<div style="font-size:13px;color:#ccc">';
  bomData.forEach(function(it) {
    var need = (parseFloat(it.qty) || 0) * qty;
    var inv = allInventory.find(function(x) { return x.item === it.item; });
    var stock = inv ? inv.stock : 0;
    var enough = stock >= need;
    html += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #111">';
    html += '<div>' + it.item + '</div>';
    html += '<div style="color:' + (enough ? '#4ade80' : '#f87171') + '">';
    html += need + ' ต้องใช้ / ' + stock + ' มีอยู่';
    html += (enough ? ' ✓' : ' ✗') + '</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('bomCalcResult').innerHTML = html;
}

function submitAddBOM() {
  var name = document.getElementById('bomItemName').value.trim();
  if (!name) { toast('ระบุชื่อวัตถุดิบ', 'err'); return; }
  var btn = document.getElementById('addBOMBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#22c55e"></div>';
  btn.disabled = true;
  callAPI({
    api: 'addBOMItem', item: name,
    qty: document.getElementById('bomItemQty').value || '0',
    unit: document.getElementById('bomItemUnit').value || '',
    cost: document.getElementById('bomItemCost').value || '0'
  }).then(function(res) {
    if (res.success) { toast('เพิ่ม ' + name + ' ใน BOM แล้ว'); closeModal('addBOMModal'); loadBOM(); }
    else { toast(res.error || 'เพิ่มไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); })
  .finally(function() { btn.innerHTML = 'เพิ่มรายการ'; btn.disabled = false; });
}

function deleteBOM(idx) {
  var it = bomData[idx];
  if (!it) return;
  if (!confirm('ลบ ' + it.item + ' จาก BOM?')) return;
  callAPI({ api: 'deleteBOMItem', row: it.row || (idx + 2) })
  .then(function(res) {
    if (res.success) { toast('ลบ ' + it.item + ' จาก BOM แล้ว'); loadBOM(); }
    else { toast(res.error || 'ลบไม่สำเร็จ', 'err'); }
  }).catch(function(err) { toast('Error: ' + err, 'err'); });
}


// ── Init ──
loadInventory();
</script>

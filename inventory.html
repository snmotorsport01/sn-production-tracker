<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Inventory — SN Production</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;background:#0a0a0a;color:#e5e5e5;
padding:16px;max-width:600px;margin:0 auto;min-height:100vh;min-height:100dvh}
.hdr{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.card{background:#151515;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #1e1e1e}
.btn{display:block;width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;
text-align:center;cursor:pointer;border:none;margin-bottom:8px;transition:.12s;-webkit-appearance:none}
.btn:active{transform:scale(.97);opacity:.8}
.btn-p{background:#DC2626;color:#fff}
.btn-g{background:#22c55e;color:#000}
.btn-o{background:transparent;color:#aaa;border:1px solid #333}
.btn-w{background:#f59e0b;color:#000}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-block;margin:0}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #333;border-top-color:#DC2626;
border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:#555}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-ok{background:#0a2a1a;color:#4ade80}
.b-low{background:#2a1a00;color:#f59e0b}
.b-crit{background:#2d1010;color:#f87171}
.b-out{background:#1a1a1a;color:#666}

/* Summary grid */
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
.sum-item{background:#0d0d0d;border-radius:10px;padding:12px;text-align:center;border:1px solid #1e1e1e}
.sum-item .n{font-size:24px;font-weight:800}

/* Stock item row */
.stock-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;
border-bottom:1px solid #1a1a1a}
.stock-row:last-child{border-bottom:none}
.stock-info{flex:1;min-width:0}
.stock-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-meta{font-size:12px;color:#666;margin-top:2px}
.stock-qty{text-align:right;margin:0 12px}
.stock-qty .n{font-size:18px;font-weight:700}
.stock-qty .unit{font-size:11px;color:#666}
.stock-bar{width:60px;height:6px;background:#1a1a1a;border-radius:3px;margin-top:4px}
.stock-bar-fill{height:100%;border-radius:3px;transition:.3s}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;
display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#151515;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;
max-height:80vh;overflow-y:auto;border:1px solid #1e1e1e;border-bottom:none}
.modal h3{font-size:16px;margin-bottom:14px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border-radius:10px;
border:1px solid #333;background:#0d0d0d;color:#fff;font-size:14px;-webkit-appearance:none}
.form-group textarea{height:60px;resize:none}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
white-space:nowrap;border:1px solid #333;background:transparent;color:#888;transition:.15s}
.tab.active{background:#DC2626;color:#fff;border-color:#DC2626}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;
z-index:200;transition:.3s;opacity:0;pointer-events:none;max-width:90%;background:#22c55e;color:#000}
.toast.err{background:#ef4444;color:#fff}
.toast.warn{background:#f59e0b;color:#000}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* PO row */
.po-row{padding:10px 0;border-bottom:1px solid #1a1a1a}
.po-row:last-child{border-bottom:none}
.po-status{font-size:11px;text-transform:uppercase;font-weight:600}

/* Search */
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;
background:#0d0d0d;color:#fff;font-size:14px;margin-bottom:10px;-webkit-appearance:none}
.search-box::placeholder{color:#555}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #222;display:flex;justify-content:center;max-width:600px;margin:0 auto;z-index:100}
.bottom-nav a{flex:1;text-align:center;padding:12px 4px;text-decoration:none;color:#555;font-size:11px;font-weight:600;transition:.12s;max-width:100px}
.bottom-nav a.active{color:#f59e0b}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Restock Modal -->
<div class="modal-bg" id="restockModal">
<div class="modal">
<h3 id="restockTitle">Restock Item</h3>
<div class="form-group">
<label>Item</label>
<input type="text" id="restockItem" readonly style="color:#888">
</div>
<div class="form-group">
<label>Current Stock</label>
<input type="text" id="restockCurrent" readonly style="color:#888">
</div>
<div class="form-group">
<label>Add Quantity</label>
<input type="number" id="restockQty" min="1" placeholder="Enter quantity to add">
</div>
<div class="form-group">
<label>Unit Cost (฿)</label>
<input type="number" id="restockCost" min="0" step="0.01" placeholder="Cost per unit (optional)">
</div>
<div class="form-group">
<label>Supplier</label>
<input type="text" id="restockSupplier" placeholder="Supplier name (optional)">
</div>
<div class="form-group">
<label>Notes</label>
<textarea id="restockNotes" placeholder="Optional notes"></textarea>
</div>
<button class="btn btn-g" onclick="submitRestock()" id="restockBtn">Confirm Restock</button>
<button class="btn btn-o" onclick="closeModal()">Cancel</button>
</div>
</div>
  <div id="editItemModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;overflow-y:auto">
    <div class="card" style="max-width:400px;margin:40px auto;padding:20px">
      <h3 id="editItemTitle" style="margin-bottom:16px">แก้ไข Item</h3>
      <div style="display:flex;flex-direction:column;gap:12px">
        <label>Category<input id="editCategory" class="input" type="text"></label>
        <label>Stock<input id="editStock" class="input" type="number"></label>
        <label>Min<input id="editMin" class="input" type="number"></label>
        <label>Max<input id="editMax" class="input" type="number"></label>
        <label>Unit<input id="editUnit" class="input" type="text"></label>
        <label>Unit Cost<input id="editUnitCost" class="input" type="number" step="0.01"></label>
        <label>Supplier<input id="editSupplier" class="input" type="text"></label>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-p" onclick="saveEditItem()" style="flex:1">บันทึก</button>
        <button class="btn btn-o" onclick="closeEditModal()" style="flex:1">ยกเลิก</button>
      </div>
      <button class="btn" onclick="confirmDeleteItem()" style="width:100%;margin-top:12px;background:#331111;color:#ff4444;border:1px solid #ff4444">ลบ Item นี้ออกจากระบบ</button>
    </div>
  </div>

<!-- Header -->
<div style="text-align:center;margin:12px 0 20px">
<div style="font-size:16px;font-weight:700;color:#fff">Inventory Management</div>
<div style="font-size:12px;color:#666;margin-top:2px">SN Motorsports — Material Tracking</div>
<div style="width:40px;height:3px;background:#DC2626;margin:8px auto 0;border-radius:2px"></div>
</div>

<!-- Tabs -->
<div class="tabs">
<div class="tab active" onclick="switchTab('stock')">Stock</div>
<div class="tab" onclick="switchTab('alerts')">Alerts <span id="alertBadge" style="display:none;background:#ef4444;color:#fff;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px"></span></div>
<div class="tab" onclick="switchTab('po')">PO Drafts</div>
<div class="tab" onclick="switchTab('bom')">BOM</div>
</div>

<!-- Tab Content -->
<div id="tab-stock">
<input type="text" class="search-box" placeholder="Search materials..." oninput="filterStock(this.value)">
<div id="stock-content"><div class="loading"><div class="spinner"></div><div style="margin-top:8px">Loading inventory...</div></div></div>
</div>

<div id="tab-alerts" style="display:none">
<div id="alerts-content"><div class="loading"><div class="spinner"></div><div style="margin-top:8px">Checking stock levels...</div></div></div>
</div>

<div id="tab-po" style="display:none">
<div id="po-content"><div class="loading"><div class="spinner"></div><div style="margin-top:8px">Loading PO drafts...</div></div></div>
</div>

<div id="tab-bom" style="display:none">
<div id="bom-content"><div class="loading"><div class="spinner"></div><div style="margin-top:8px">Loading BOM...</div></div></div>
</div>

<!-- Bottom nav -->
<div style="margin-top:8px">
<a href="index.html" class="btn btn-o" style="text-decoration:none;display:block;text-align:center">Back to Tracker</a>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbxO6U1vMy2gSOj_1CgZjkzftZh6Vdl9apsbhwQ5TqAub6gfh6EhDQrUKegxI0Mz8Woh/exec';
var allInventory = [];
var allPOs = [];
var bomData = [];
var currentRestockItem = null;

function callAPI(params) {
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] || '');
  }).join('&');
  return fetch(API_URL + '?' + qs, { redirect: 'follow' }).then(function(r) { return r.json(); });
}

function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

// ── Tab switching ──
function switchTab(tab) {
  ['stock','alerts','po','bom'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(el, i) {
    var tabs = ['stock','alerts','po','bom'];
    el.className = 'tab' + (tabs[i] === tab ? ' active' : '');
  });
  if (tab === 'alerts') loadAlerts();
  if (tab === 'po') loadPOs();
  if (tab === 'bom') loadBOM();
}

// ── Stock List ──
function loadInventory() {
  callAPI({ api: 'listInventory' }).then(function(data) {
    allInventory = data;
    renderStock(data);
    updateAlertBadge(data);
  }).catch(function(err) {
    document.getElementById('stock-content').innerHTML =
      '<div class="card" style="text-align:center;color:#f87171">Error loading inventory<br><span style="font-size:13px">' + err + '</span></div>' +
      '<button class="btn btn-o" onclick="loadInventory()">Retry</button>';
  });
}

function getStockStatus(stock, min) {
  if (stock <= 0) return { label: 'Out', cls: 'b-out', color: '#666' };
  if (stock <= min * 0.5) return { label: 'Critical', cls: 'b-crit', color: '#f87171' };
  if (stock <= min) return { label: 'Low', cls: 'b-low', color: '#f59e0b' };
  return { label: 'OK', cls: 'b-ok', color: '#4ade80' };
}

function renderStock(items) {
  if (!items.length) {
    document.getElementById('stock-content').innerHTML =
      '<div class="card" style="text-align:center;color:#555;padding:24px">No inventory items</div>';
    return;
  }

  // Summary counts
  var ok = 0, low = 0, crit = 0;
  items.forEach(function(it) {
    var s = getStockStatus(it.stock, it.min);
    if (s.label === 'OK') ok++;
    else if (s.label === 'Low') low++;
    else crit++;
  });

  var html = '<div class="card">';
  html += '<div class="sum-grid">';
  html += '<div class="sum-item"><div class="n" style="color:#4ade80">' + ok + '</div><div class="hdr">OK</div></div>';
  html += '<div class="sum-item"><div class="n" style="color:#f59e0b">' + low + '</div><div class="hdr">Low</div></div>';
  html += '<div class="sum-item"><div class="n" style="color:#f87171">' + crit + '</div><div class="hdr">Critical</div></div>';
  html += '</div></div>';

  html += '<div class="card" id="stockList">';
  items.forEach(function(it, idx) {
    var s = getStockStatus(it.stock, it.min);
    var maxVal = it.max || (it.min * 3) || 100;
    var pct = Math.min(100, Math.round((it.stock / maxVal) * 100));
    html += '<div class="stock-row" data-name="' + (it.item || '').toLowerCase() + '">';
    html += '<div class="stock-info">';
    html += '<div class="stock-name" style="cursor:pointer;text-decoration:underline dotted" onclick="openEditItem(' + idx + ')">' + (it.item || 'Unknown') + '</div>';
    html += '<div class="stock-meta">' + (it.category || '-') + ' · Min: ' + (it.min || 0) + ' · ' + (it.unit || '-') + '</div>';
    html += '<div class="stock-bar"><div class="stock-bar-fill" style="width:' + pct + '%;background:' + s.color + '"></div></div>';
    html += '</div>';
    html += '<div class="stock-qty"><div class="n" style="color:' + s.color + '">' + (it.stock || 0) + '</div>';
    html += '<span class="badge ' + s.cls + '">' + s.label + '</span></div>';
    html += '<button class="btn btn-sm btn-o" style="margin-left:8px;border-color:' + s.color + ';color:' + s.color + '" onclick="openRestock(' + idx + ')">+</button>';
      html += '<button class="btn btn-sm btn-o" style="margin-left:4px;border-color:#ff4444;color:#ff4444" onclick="openReduceStock(' + idx + ')">-</button>';
    html += '</div>';
  });
  html += '</div>';

  document.getElementById('stock-content').innerHTML = html;
}

function filterStock(q) {
  q = q.toLowerCase();
  var rows = document.querySelectorAll('.stock-row');
  rows.forEach(function(row) {
    row.style.display = row.getAttribute('data-name').indexOf(q) >= 0 ? 'flex' : 'none';
  });
}

function updateAlertBadge(items) {
  var count = 0;
  items.forEach(function(it) {
    var s = getStockStatus(it.stock, it.min);
    if (s.label !== 'OK') count++;
  });
  var badge = document.getElementById('alertBadge');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

// ── Restock Modal ──
function openRestock(idx) {
  var it = allInventory[idx];
  currentRestockItem = it;
  document.getElementById('restockItem').value = it.item;
  document.getElementById('restockCurrent').value = it.stock + ' ' + (it.unit || '');
  document.getElementById('restockQty').value = '';
  document.getElementById('restockCost').value = it.unitCost || '';
  document.getElementById('restockSupplier').value = it.supplier || '';
  document.getElementById('restockNotes').value = '';
  document.getElementById('restockModal').className = 'modal-bg show';
}

function closeModal() {
  document.getElementById('restockModal').className = 'modal-bg';
  currentRestockItem = null;
}

function submitRestock() {
  if (!currentRestockItem) return;
  var qty = parseInt(document.getElementById('restockQty').value);
  if (!qty || qty <= 0) { toast('Enter a valid quantity', 'err'); return; }

  var btn = document.getElementById('restockBtn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#22c55e"></div> Updating...';
  btn.disabled = true;

  callAPI({
    api: 'restockItem',
    item: currentRestockItem.item,
    qty: qty,
    cost: document.getElementById('restockCost').value || '',
    supplier: document.getElementById('restockSupplier').value || '',
    notes: document.getElementById('restockNotes').value || ''
  }).then(function(res) {
    if (res.success) {
      toast('Restocked ' + qty + ' ' + (currentRestockItem.unit || 'units') + ' of ' + currentRestockItem.item);
      closeModal();
      loadInventory();
    } else {
      toast(res.error || 'Restock failed', 'err');
    }
  }).catch(function(err) {
    toast('Error: ' + err, 'err');
  }).finally(function() {
    btn.innerHTML = 'Confirm Restock';
    btn.disabled = false;
  });
}

// ── Alerts Tab ──
function loadAlerts() {
  var items = allInventory;
  if (!items.length) {
    callAPI({ api: 'listInventory' }).then(function(data) {
      allInventory = data;
      renderAlerts(data);
    });
    return;
  }
  renderAlerts(items);
}

function renderAlerts(items) {
  var alerts = items.filter(function(it) {
    return getStockStatus(it.stock, it.min).label !== 'OK';
  });

  if (!alerts.length) {
    document.getElementById('alerts-content').innerHTML =
      '<div class="card" style="text-align:center;padding:24px"><div style="font-size:28px;margin-bottom:8px">✓</div><div style="color:#4ade80;font-weight:600">All stock levels OK</div></div>';
    return;
  }

  var html = '<div class="card" style="border-color:#f59e0b33">';
  html += '<div style="font-weight:700;margin-bottom:10px;color:#f59e0b">' + alerts.length + ' items need attention</div>';
  alerts.sort(function(a, b) { return (a.stock / (a.min || 1)) - (b.stock / (b.min || 1)); });
  alerts.forEach(function(it) {
    var s = getStockStatus(it.stock, it.min);
    var deficit = Math.max(0, (it.max || it.min * 2) - it.stock);
    html += '<div class="stock-row">';
    html += '<div class="stock-info">';
    html += '<div class="stock-name" style="color:' + s.color + '">' + it.item + '</div>';
    html += '<div class="stock-meta">Stock: ' + it.stock + ' / Min: ' + it.min + ' · Need: ' + deficit + ' ' + (it.unit || '') + '</div>';
    html += '</div>';
    html += '<span class="badge ' + s.cls + '">' + s.label + '</span>';
    html += '</div>';
  });
  html += '</div>';

  html += '<button class="btn btn-w" onclick="createPOFromAlerts()">Create PO Draft for Low Stock Items</button>';

  document.getElementById('alerts-content').innerHTML = html;
}

function createPOFromAlerts() {
  var lowItems = allInventory.filter(function(it) {
    return getStockStatus(it.stock, it.min).label !== 'OK';
  });
  if (!lowItems.length) { toast('No low stock items', 'warn'); return; }

  var itemsList = lowItems.map(function(it) {
    var need = Math.max(0, (it.max || it.min * 2) - it.stock);
    return it.item + ' x' + need;
  }).join(', ');

  var suppliers = [];
  lowItems.forEach(function(it) {
    if (it.supplier && suppliers.indexOf(it.supplier) < 0) suppliers.push(it.supplier);
  });

  callAPI({
    api: 'createPODraft',
    items: itemsList,
    suppliers: suppliers.join(', ') || 'TBD',
    urgency: 'High'
  }).then(function(res) {
    if (res.success) {
      toast('PO Draft created!');
      switchTab('po');
    } else {
      toast(res.error || 'Failed to create PO', 'err');
    }
  }).catch(function(err) {
    toast('Error: ' + err, 'err');
  });
}

// ── PO Drafts Tab ──
function loadPOs() {
  callAPI({ api: 'listPODrafts' }).then(function(data) {
    allPOs = data;
    renderPOs(data);
  }).catch(function(err) {
    document.getElementById('po-content').innerHTML =
      '<div class="card" style="text-align:center;color:#f87171">Error loading POs</div>';
  });
}

function renderPOs(pos) {
  if (!pos.length) {
    document.getElementById('po-content').innerHTML =
      '<div class="card" style="text-align:center;color:#555;padding:24px">No PO drafts</div>';
    return;
  }

  var html = '';
  pos.forEach(function(po) {
    var urgColor = po.urgency === 'High' ? '#f87171' : po.urgency === 'Medium' ? '#f59e0b' : '#4ade80';
    html += '<div class="card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html += '<div style="font-weight:600;font-size:14px">' + (po.date || '-') + '</div>';
    html += '<div><span class="badge" style="background:' + urgColor + '22;color:' + urgColor + '">' + (po.urgency || '-') + '</span>';
    html += ' <span class="po-status" style="color:#888">' + (po.status || 'Draft') + '</span></div>';
    html += '</div>';
    html += '<div style="font-size:13px;color:#ccc;margin-bottom:4px">' + (po.items || '-') + '</div>';
    html += '<div style="font-size:12px;color:#666">Suppliers: ' + (po.suppliers || '-') + '</div>';
    html += '</div>';
  });
  document.getElementById('po-content').innerHTML = html;
}

// ── BOM Tab ──
function loadBOM() {
  callAPI({ api: 'listBOM' }).then(function(data) {
    bomData = data;
    renderBOM(data);
  }).catch(function(err) {
    document.getElementById('bom-content').innerHTML =
      '<div class="card" style="text-align:center;color:#f87171">Error loading BOM</div>';
  });
}

function renderBOM(items) {
  if (!items.length) {
    document.getElementById('bom-content').innerHTML =
      '<div class="card" style="text-align:center;color:#555;padding:24px">No BOM data</div>';
    return;
  }

  var totalCost = 0;
  var html = '<div class="card">';
  html += '<div style="font-weight:700;margin-bottom:4px">SN Mirror — Bill of Materials</div>';
  html += '<div style="font-size:12px;color:#666;margin-bottom:10px">Materials required per 1 unit</div>';

  items.forEach(function(it) {
    var cost = parseFloat(it.cost) || 0;
    totalCost += cost;
    html += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a1a;font-size:13px">';
    html += '<div><span style="color:#fff">' + it.item + '</span> <span style="color:#666">x' + it.qty + ' ' + (it.unit || '') + '</span></div>';
    html += '<div style="color:#f59e0b;font-weight:600">฿' + cost.toLocaleString('th-TH', {minimumFractionDigits:2}) + '</div>';
    html += '</div>';
  });

  html += '<div style="display:flex;justify-content:space-between;padding:10px 0 4px;font-weight:700;font-size:14px;border-top:2px solid #333;margin-top:4px">';
  html += '<div>Total per unit</div>';
  html += '<div style="color:#DC2626">฿' + totalCost.toLocaleString('th-TH', {minimumFractionDigits:2}) + '</div>';
  html += '</div>';
  html += '</div>';

  // Deduction calculator
  html += '<div class="card">';
  html += '<div style="font-weight:700;margin-bottom:8px">Deduction Calculator</div>';
  html += '<div class="form-group"><label>Batch Quantity</label>';
  html += '<input type="number" id="bomCalcQty" min="1" value="1" onchange="calcBOM()" oninput="calcBOM()"></div>';
  html += '<div id="bomCalcResult"></div>';
  html += '</div>';

  document.getElementById('bom-content').innerHTML = html;
  calcBOM();
}

function calcBOM() {
  var qty = parseInt(document.getElementById('bomCalcQty').value) || 1;
  var html = '<div style="font-size:13px;color:#ccc">';
  bomData.forEach(function(it) {
    var need = (parseFloat(it.qty) || 0) * qty;
    var inv = allInventory.find(function(x) { return x.item === it.item; });
    var stock = inv ? inv.stock : 0;
    var enough = stock >= need;
    html += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #111">';
    html += '<div>' + it.item + '</div>';
    html += '<div style="color:' + (enough ? '#4ade80' : '#f87171') + '">';
    html += need + ' needed / ' + stock + ' in stock';
    html += (enough ? ' ✓' : ' ✗') + '</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('bomCalcResult').innerHTML = html;
}

// ── Init ──
loadInventory();

    var currentEditIdx = null;
    function openReduceStock(idx) {
      var item = allInventory[idx];
      if (!item) return;
      var qty = prompt("ลดจำนวน " + item.item + " (สต็อกปัจจุบัน: " + item.stock + " " + (item.unit||"") + ")\nระบุจำนวนที่ต้องการลด:");
      if (!qty || isNaN(qty) || Number(qty) <= 0) return;
      var newStock = Math.max(0, item.stock - Number(qty));
      callAPI({api:"updateInventoryItem", item:item.item, stock:newStock}).then(function(r) {
        if (r.success) { toast(item.item + " ลดเหลือ " + newStock,"#4CAF50"); loadInventory(); }
        else { toast("Error: " + (r.error||"Unknown"),"#f44"); }
      }).catch(function(e) { toast("Error: "+e.message,"#f44"); });
    }

    function openEditItem(idx) {
      var item = allInventory[idx];
      if (!item) return;
      currentEditIdx = idx;
      document.getElementById("editItemTitle").textContent = "แก้ไข: " + item.item;
      document.getElementById("editCategory").value = item.category || "";
      document.getElementById("editStock").value = item.stock || 0;
      document.getElementById("editMin").value = item.min || 0;
      document.getElementById("editMax").value = item.max || 0;
      document.getElementById("editUnit").value = item.unit || "";
      document.getElementById("editUnitCost").value = item.unitCost || 0;
      document.getElementById("editSupplier").value = item.supplier || "";
      document.getElementById("editItemModal").style.display = "block";
    }

    function closeEditModal() { document.getElementById("editItemModal").style.display = "none"; currentEditIdx = null; }

    function saveEditItem() {
      if (currentEditIdx === null) return;
      var item = allInventory[currentEditIdx];
      var params = { api:"updateInventoryItem", item:item.item,
        category: document.getElementById("editCategory").value,
        stock: document.getElementById("editStock").value,
        min: document.getElementById("editMin").value,
        max: document.getElementById("editMax").value,
        unit: document.getElementById("editUnit").value,
        unitCost: document.getElementById("editUnitCost").value,
        supplier: document.getElementById("editSupplier").value
      };
      callAPI(params).then(function(r) {
        if (r.success) { toast(item.item + " อัปเดตแล้ว","#4CAF50"); closeEditModal(); loadInventory(); }
        else { toast("Error: "+(r.error||"Unknown"),"#f44"); }
      }).catch(function(e) { toast("Error: "+e.message,"#f44"); });
    }

    function confirmDeleteItem() {
      if (currentEditIdx === null) return;
      var item = allInventory[currentEditIdx];
      if (!confirm("ลบ " + item.item + " ออกจากระบบถาวร?")) return;
      callAPI({api:"deleteInventoryItem", item:item.item}).then(function(r) {
        if (r.success) { toast(item.item + " ถูกลบแล้ว","#4CAF50"); closeEditModal(); loadInventory(); }
        else { toast("Error: "+(r.error||"Unknown"),"#f44"); }
      }).catch(function(e) { toast("Error: "+e.message,"#f44"); });
    }
